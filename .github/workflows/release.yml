name: Reusable release

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: "22"
      verify-command:
        description: Command that must pass before releasing (lint/typecheck/build/tests)
        type: string
        default: "npm run ci"
      main-branch:
        description: Name of the stable/production branch
        type: string
        default: "main"
      develop-branch:
        description: Name of the integration branch
        type: string
        default: "develop"
      publish-docker:
        description: Whether to build and push a Docker image to GHCR on release
        type: boolean
        default: false
      docker-image:
        description: GHCR image name (defaults to the repository name, lowercased)
        type: string
        default: ""
    secrets:
      release-token:
        description: >
          PAT with repo + workflow scope, used to temporarily lift branch
          protection for the release commit and to push the version-sync
          commit back to develop. Falls back to GITHUB_TOKEN when absent,
          which cannot touch protected branches.
        required: false

jobs:
  release:
    name: Semantic release and optional GHCR image
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[release-sync]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.release-token || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: ${{ inputs.verify-command }}

      - name: Temporarily disable branch protection for release commit
        env:
          GH_TOKEN: ${{ secrets.release-token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PROTECTION_FILE: ${{ runner.temp }}/branch-protection.json
          RESTORE_FILE: ${{ runner.temp }}/branch-protection-restore.json
        shell: bash
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "release-token secret is required to update protected release branches."
            exit 1
          fi

          gh api "repos/$GITHUB_REPOSITORY/branches/$GITHUB_REF_NAME/protection" > "$PROTECTION_FILE"

          jq '{
            required_status_checks: (
              if .required_status_checks == null then null
              else {
                strict: .required_status_checks.strict,
                contexts: (.required_status_checks.contexts // [])
              }
              end
            ),
            enforce_admins: (.enforce_admins.enabled // false),
            required_pull_request_reviews: (
              if .required_pull_request_reviews == null then null
              else {
                dismiss_stale_reviews: (.required_pull_request_reviews.dismiss_stale_reviews // false),
                require_code_owner_reviews: (.required_pull_request_reviews.require_code_owner_reviews // false),
                required_approving_review_count: (.required_pull_request_reviews.required_approving_review_count // 0),
                require_last_push_approval: (.required_pull_request_reviews.require_last_push_approval // false)
              }
              end
            ),
            restrictions: null,
            required_linear_history: (.required_linear_history.enabled // false),
            allow_force_pushes: (.allow_force_pushes.enabled // false),
            allow_deletions: (.allow_deletions.enabled // false),
            block_creations: (.block_creations.enabled // false),
            required_conversation_resolution: (.required_conversation_resolution.enabled // false),
            lock_branch: (.lock_branch.enabled // false),
            allow_fork_syncing: (.allow_fork_syncing.enabled // false)
          }' "$PROTECTION_FILE" > "$RESTORE_FILE"

          gh api -X DELETE "repos/$GITHUB_REPOSITORY/branches/$GITHUB_REF_NAME/protection"

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.release-token || secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Restore branch protection
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.release-token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RESTORE_FILE: ${{ runner.temp }}/branch-protection-restore.json
        shell: bash
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "release-token secret is not configured; branch protection cannot be restored by this workflow."
            exit 1
          fi

          if [[ ! -s "$RESTORE_FILE" ]]; then
            echo "No branch protection backup found; nothing to restore."
            exit 0
          fi

          gh api -X PUT \
            "repos/$GITHUB_REPOSITORY/branches/$GITHUB_REF_NAME/protection" \
            --input "$RESTORE_FILE"

      - name: Sync stable release commit to develop
        if: github.ref_name == inputs.main-branch && env.RELEASE_VERSION != ''
        env:
          GH_TOKEN: ${{ secrets.release-token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          MAIN_BRANCH: ${{ inputs.main-branch }}
          DEVELOP_BRANCH: ${{ inputs.develop-branch }}
        shell: bash
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "release-token secret is required to sync the stable release commit to $DEVELOP_BRANCH."
            exit 1
          fi

          develop_protection_file="$RUNNER_TEMP/develop-protection.json"
          develop_restore_file="$RUNNER_TEMP/develop-protection-restore.json"

          restore_develop_protection() {
            if [[ -s "$develop_restore_file" ]]; then
              gh api -X PUT \
                "repos/$GITHUB_REPOSITORY/branches/$DEVELOP_BRANCH/protection" \
                --input "$develop_restore_file" >/dev/null || true
            fi
          }
          trap restore_develop_protection EXIT

          gh api "repos/$GITHUB_REPOSITORY/branches/$DEVELOP_BRANCH/protection" > "$develop_protection_file"

          jq '{
            required_status_checks: (
              if .required_status_checks == null then null
              else {
                strict: .required_status_checks.strict,
                contexts: (.required_status_checks.contexts // [])
              }
              end
            ),
            enforce_admins: (.enforce_admins.enabled // false),
            required_pull_request_reviews: (
              if .required_pull_request_reviews == null then null
              else {
                dismiss_stale_reviews: (.required_pull_request_reviews.dismiss_stale_reviews // false),
                require_code_owner_reviews: (.required_pull_request_reviews.require_code_owner_reviews // false),
                required_approving_review_count: (.required_pull_request_reviews.required_approving_review_count // 0),
                require_last_push_approval: (.required_pull_request_reviews.require_last_push_approval // false)
              }
              end
            ),
            restrictions: null,
            required_linear_history: (.required_linear_history.enabled // false),
            allow_force_pushes: (.allow_force_pushes.enabled // false),
            allow_deletions: (.allow_deletions.enabled // false),
            block_creations: (.block_creations.enabled // false),
            required_conversation_resolution: (.required_conversation_resolution.enabled // false),
            lock_branch: (.lock_branch.enabled // false),
            allow_fork_syncing: (.allow_fork_syncing.enabled // false)
          }' "$develop_protection_file" > "$develop_restore_file"

          gh api -X DELETE "repos/$GITHUB_REPOSITORY/branches/$DEVELOP_BRANCH/protection"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$MAIN_BRANCH" "$DEVELOP_BRANCH"
          release_sha="$(git rev-parse "origin/$MAIN_BRANCH")"

          git switch --detach "origin/$DEVELOP_BRANCH"
          git checkout "$release_sha" -- package.json package-lock.json

          if git diff --quiet -- package.json package-lock.json; then
            git commit --allow-empty \
              -m "chore(release): sync $MAIN_BRANCH release $RELEASE_VERSION [release-sync]" \
              -m "Main release commit: $release_sha"
          else
            git add package.json package-lock.json
            git commit \
              -m "chore(release): sync $MAIN_BRANCH release $RELEASE_VERSION [release-sync]" \
              -m "Main release commit: $release_sha"
          fi

          git push \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:$DEVELOP_BRANCH"

      - name: Delete obsolete GitHub prereleases after stable release
        if: github.ref_name == inputs.main-branch && env.RELEASE_VERSION != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          prereleases="$(gh api "repos/$GH_REPO/releases?per_page=100" --paginate --jq '.[] | select(.prerelease == true) | [.id, .tag_name] | @tsv')"

          if [[ -z "$prereleases" ]]; then
            echo "No prereleases to delete."
            exit 0
          fi

          while IFS=$'\t' read -r id tag_name; do
            [[ -z "$id" ]] && continue
            echo "Deleting prerelease id $id"
            gh api -X DELETE "repos/$GH_REPO/releases/$id"

            if [[ -n "$tag_name" ]]; then
              echo "Deleting prerelease tag $tag_name"
              gh api -X DELETE "repos/$GH_REPO/git/refs/tags/$tag_name" || true
            fi
          done <<< "$prereleases"

      - name: Setup Docker Buildx
        if: inputs.publish-docker && env.RELEASE_VERSION != ''
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: inputs.publish-docker && env.RELEASE_VERSION != ''
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: inputs.publish-docker && env.RELEASE_VERSION != ''
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          MAIN_BRANCH: ${{ inputs.main-branch }}
          IMAGE_OVERRIDE: ${{ inputs.docker-image }}
        shell: bash
        run: |
          image="${IMAGE_OVERRIDE:-ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')}"
          short_sha="${GITHUB_SHA::7}"
          tags=(
            "--tag" "$image:$RELEASE_VERSION"
            "--tag" "$image:sha-$short_sha"
          )

          if [[ "$GITHUB_REF_NAME" == "$MAIN_BRANCH" ]]; then
            tags+=("--tag" "$image:latest")
          else
            tags+=("--tag" "$image:$GITHUB_REF_NAME")
          fi

          docker buildx build \
            --push \
            --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.version=$RELEASE_VERSION" \
            "${tags[@]}" \
            .
